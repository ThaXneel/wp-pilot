version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: obmat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: obmat
      POSTGRES_PASSWORD: obmat_dev
      POSTGRES_DB: obmat
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U obmat']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: obmat-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
