name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_webhook_url:
        description: "Backend deploy webhook URL (leave empty to skip)"
        required: false
      vercel_token:
        description: "Vercel deploy token (leave empty to skip)"
        required: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run build --workspace=apps/backend
      # Railway auto-deploys via Git integration.
      # Use workflow_dispatch with deploy_webhook_url for manual trigger.
      - name: Deploy Backend
        if: inputs.deploy_webhook_url != ''
        run: curl -X POST "${{ inputs.deploy_webhook_url }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      # Vercel auto-deploys via Git integration.
      # Use workflow_dispatch with vercel_token for manual trigger.
      - name: Deploy Frontend
        if: inputs.vercel_token != ''
        run: npx vercel --prod --token="${{ inputs.vercel_token }}"
